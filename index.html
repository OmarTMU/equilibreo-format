<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equilibreo Format</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preload" href="cards.json" as="fetch" crossorigin>

<body>

  <main id="deckbuilder"> <!-- whole page apart from title at the top -->

    <div id="left-side">
        <div id="card-view"> <!-- card image + text of card description -->
            <div id="display-card"></div>
            <div id="card-desc"></div>
        </div>
        <div id="deck-buttons"> <!-- import, export, clear deck, set as default, deck select, new deck, rename, save, delete deck -->
            <!--
                <button class="deck-constructor-button" id="import">Import</button>
            -->
            <button class="deck-constructor-button" id="import">Import</button>
            <input 
                id="import-file" 
                type="file" 
                accept=".ydk" 
                hidden
            >
            <button class="deck-constructor-button" id="export">Export</button>
            <input 
                type="file" 
                id="export-file" 
                accept=".ydk" 
                style="display:none;"
            >
            <!--
                 <button class="deck-constructor-button" id="set-as-default">Set as default</button>
            -->
            <Select class="deck-constructor-button" id="select-deck">
               <!--<option value="deck1">Deck 1</option>--> 
            </Select>
            <button class="deck-constructor-button" id="set-default-deck">Set as Default</button>
        
            <button class="deck-constructor-button" id="clear-deck">Clear Deck</button>
            <button class="deck-constructor-button" id="new-deck">New Deck</button>
            <button class="deck-constructor-button" id="rename">Rename</button>
            <button class="deck-constructor-button" id="save">Save</button>
            <button class="deck-constructor-button" id="delete">Delete</button>
            <button class="deck-constructor-button" id="save-as">Save As</button>
        </div>

        <div id="auth-container">
            <!--
                <button id="light-dark-mode">dark mode</button>
            -->
            <h3>Login/Register</h3>

            <div class="auth-row">
                <label class="auth-label" for="username">Username</label>
                <input class="auth-box" type="text" id="username" />
            </div>
        
            <div class="auth-row">
                <label class="auth-label" for="password">Password.</label>
                <input class="auth-box" type="password" id="password" />
            </div>
        
            <div class="auth-buttons">
                <button class="auth-btn" id="login-btn">Login</button>
                <button class="auth-btn" id="register-btn">Register</button>
                <button class="auth-btn" id="logout-btn">Logout</button>
                <button class="auth-btn" id="delete-account-btn">
                    Delete Account
                </button>
            </div>

            <div id="error-msg">Log in or register to use all features!</div> <!--incorrect user/password / user already exists / account created-->
        </div>

    </div>
    
    <div id="column-gap">.</div>

    <div id="deck-list"> <!-- main/side/extra -->

        <div id="main-deck-section">

            <div class="title-main-deck">Main Deck</div> <!--left sidebar-->

    <div id="column-gap">.</div>

    <!-- SEARCH CARD -->
    <div id="search-section">

        <div id="filter-rows-box">

            <!-- name input -->
            <div class="filter-row">
                <label class="name-label" for="card-name">Name: </label>
                <input class="name-box" id="card-name" type="text" />
            </div>
            
            <!-- description input -->
            <div class="filter-row">
                <label class="desc-label" for="card-description">Description: </label>
                <input class="desc-box" id="card-description" type="text" />
            </div>
            
            <!-- card type select-->
            <div class="filter-row">

                <label class="card-type-label" for="card-type">Card: </label>

                <select class="card-type-box" id="card-type">
                    <option value=""></option>
                    <option value="monster">Monster</option>
                    <option value="spell">Spell</option>
                    <option value="trap">Trap</option>
                </select>

                <select class="card-type-box" id="monster-background" disabled>
                    <option value=""></option>
                    <option value="normal">Normal</option>
                    <option value="effect">Effect</option>
                    <option value="ritual">Ritual</option>
                    <option value="fusion">Fusion</option>
                    <option value="xyz">Xyz</option>
                </select>

            </div>

            <div class="filter-row">
                <label for="card-subtype" class="label card-subtype-label">Type:</label>
                <select class="card-subtype-box" id="card-subtype" disabled>
                </select>
                
                <select class="card-mechanic-box" id="monster-mechanic" disabled>
                    <option value=""></option>
                    <option value="tuner">Tuner</option>
                    <option value="flip">Flip</option>
                    <option value="gemini">Gemini</option>
                    <option value="union">Union</option>
                    <option value="spirit">Spirit</option>
                    <option value="toon">Toon</option>
                </select>
            </div>

            <div class="filter-row">
                <label for="attribute-select" class="label att-select-label">Attribute:</label>
                <select id="attribute-select" class="att-select-box" disabled>
                    <option value=""></option>
                    <option value="dark">DARK</option>
                    <option value="light">LIGHT</option>
                    <option value="earth">EARTH</option>
                    <option value="water">WATER</option>
                    <option value="fire">FIRE</option>
                    <option value="wind">WIND</option>
                </select>
            
                <label for="level-min" class="label level-label">Level:</label>
                <input class="level-box" type="text" id="level-min" placeholder="min" disabled>
                <input class="level-box" type="text" id="level-max" placeholder="max" disabled>
            </div>

            <div class="filter-row">
                <label for="atk-min" class="label atk-label">ATK</label>
                <input class="atk-box" type="text" id="atk-min" placeholder="min" disabled>
                <input class="atk-box" type="text" id="atk-max" placeholder="max" disabled>

                <label for="def-min" class="label def-label">DEF</label>
                <input class="def-box" type="text" id="def-min" placeholder="min" disabled>
                <input class="def-box" type="text" id="def-max" placeholder="max" disabled>
            </div>

            <div id="limit-and-search-box-1">
                <button id="prev-page">←</button>
                <button id="search-button">Search</button>
                <button id="next-page">→</button>
            </div>

            <div id="limit-and-search-box-2">
                <label for="limit-select" class="label limit-label">Limit:</label>
                <select class="limit-box" id="limit-select" disabled>
                    <option value=""></option>
                    <option value="3">3</option>
                    <option value="2">2</option>
                    <option value="1">1</option>
                </select>
                <div id="page-number"></div>
            </div>


        </div>
